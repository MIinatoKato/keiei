<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>経営の基礎 一問一答</title>
<style>
  :root { --ink:#1e2430; --paper:#f6f7f4; --aka:#c62f2f; --aka2:#b82a2a; --ai:#2b4a7d; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin:0; min-height:100vh; background:var(--paper); color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic",Meiryo,sans-serif;
    display:flex; flex-direction:column; align-items:center; padding-bottom:40px;
  }
  .wrap { width:100%; max-width:760px; padding:0 18px; }
  header { padding-top:22px; }
  h1 { margin:0; font-size:22px; font-weight:800; letter-spacing:.04em; }
  h1 .dot { color:var(--aka); }
  .sub { font-size:12px; color:#6b7280; margin-left:8px; }
  .lead { margin:6px 0 0; font-size:12.5px; color:#6b7280; line-height:1.6; }
  .badge-aka { display:inline-block; background:var(--aka); color:#fff; border-radius:4px; padding:1px 6px; font-size:11px; font-weight:700; margin-right:4px; }
  .red { color:var(--aka); font-weight:700; }
  .chips { display:flex; gap:8px; overflow-x:auto; padding:10px 0 4px; -webkit-overflow-scrolling:touch; }
  .chips2 { display:flex; gap:8px; flex-wrap:wrap; padding:4px 0 12px; }
  .chip {
    padding:6px 12px; border-radius:999px; border:1.5px solid #c9cdc5; background:transparent;
    color:var(--ink); font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; font-family:inherit;
  }
  .chip.on { background:var(--ink); border-color:var(--ink); color:var(--paper); }
  .chip.aka-on { background:var(--aka); border-color:var(--aka); color:#fff; }
  .meta { display:flex; justify-content:space-between; font-size:12px; color:#6b7280; margin-bottom:4px; }
  .meta b { color:var(--ai); }
  .bar { height:4px; background:#e3e6df; border-radius:2px; }
  .bar > div { height:4px; background:var(--ai); border-radius:2px; transition:width .25s; width:0; }
  .card {
    background:#fff; border:1.5px solid #dfe2da; border-radius:14px; padding:18px 18px 16px;
    box-shadow:0 2px 10px rgba(30,36,48,.05); margin-top:16px;
  }
  .tags { display:flex; gap:8px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
  .tag-lec { font-size:11px; font-weight:700; color:var(--ai); border:1px solid var(--ai); border-radius:4px; padding:1px 7px; }
  .tag-must { font-size:11px; font-weight:700; color:#fff; background:var(--aka); border-radius:4px; padding:1px 7px; }
  .tag-known { font-size:11px; color:var(--ai); font-weight:700; }
  .qtext { margin:0; font-size:17px; font-weight:700; line-height:1.7; }
  .ans-area { margin-top:14px; border-radius:10px; min-height:96px; cursor:pointer; position:relative; overflow:hidden; }
  .ans-area.revealed { border:1.5px dashed #d3d7cd; background:#fbfbf8; }
  .ans-text { padding:14px; font-size:15px; line-height:1.85; visibility:hidden; }
  .ans-area.revealed .ans-text { visibility:visible; }
  .sheet {
    position:absolute; inset:0; border-radius:10px;
    background:repeating-linear-gradient(-45deg, var(--aka), var(--aka) 14px, var(--aka2) 14px, var(--aka2) 28px);
    display:flex; align-items:center; justify-content:center;
    color:rgba(255,255,255,.92); font-weight:800; font-size:14px; letter-spacing:.12em; user-select:none;
  }
  .ans-area.revealed .sheet { display:none; }
  .controls { display:flex; gap:8px; margin-top:14px; }
  .btn {
    flex:1; padding:12px 0; border-radius:10px; border:1.5px solid #c9cdc5; background:#fff;
    color:var(--ink); font-weight:700; font-size:14px; cursor:pointer; font-family:inherit;
  }
  .btn-mada { flex:1.2; border-color:var(--aka); color:var(--aka); }
  .btn-oboe { flex:1.2; border-color:var(--ai); background:var(--ai); color:#fff; }
  details {
    background:#fff; border:1px solid #e3e6df; border-radius:10px; padding:10px 14px; margin-bottom:8px;
  }
  summary { cursor:pointer; font-size:14.5px; font-weight:700; line-height:1.6; list-style:none; }
  summary::-webkit-details-marker { display:none; }
  .l-lec { color:var(--ai); font-size:11px; font-weight:700; margin-right:6px; }
  .l-must { font-size:10.5px; font-weight:700; color:#fff; background:var(--aka); border-radius:3px; padding:0 5px; margin-right:6px; }
  .l-ans { margin:8px 0 2px; font-size:14px; line-height:1.8; color:#333; }
  .empty { margin-top:40px; color:#6b7280; text-align:center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>経営の基礎<span class="dot">・</span>一問一答 <span class="sub">第2回〜第12回</span></h1>
    <p class="lead"><span class="badge-aka">赤字</span>バッジ＝赤字を含む問題。<span class="red">赤い文字</span>がスライドで実際に赤字だった箇所。答えは赤シートをめくって確認。</p>
  </header>
  <div class="chips" id="lecChips"></div>
  <div class="chips2">
    <button class="chip" id="mustBtn">赤字のみ</button>
    <button class="chip" id="shuffleBtn">シャッフル</button>
    <button class="chip" id="resetBtn">講義順に戻す</button>
    <button class="chip" id="modeBtn">一覧モード</button>
  </div>
  <div class="meta"><span id="posLabel">0 / 0</span><span>覚えた <b id="knownLabel">0</b> / <span id="totalLabel">0</span></span></div>
  <div class="bar"><div id="barFill"></div></div>
  <div id="main"></div>
</div>

<script>
const QUESTIONS = [{"lec": 2, "must": true, "q": "経済学とはどのような学問か？", "a": "((資源の最適配分))を考える学問。資源は限られているため、全体的に効率よく配分し良い結果につなげる必要がある。"}, {"lec": 2, "must": true, "q": "マクロ経済学とミクロ経済学の違いは？", "a": "マクロ経済学＝((国もしくは社会全体))における最適配分を考える。ミクロ経済学＝((個人・企業の行動))から最適配分を考える。"}, {"lec": 2, "must": true, "q": "経済学では企業を何として表現するか？", "a": "((生産関数)) f(x)=y として表現する（投入資源xから産出yが生まれる関係）。"}, {"lec": 2, "must": false, "q": "労働集約的企業と資本集約的企業の違いは？（例も）", "a": "労働集約的企業＝労働力をより多く使ってビジネスをする企業。資本集約的企業＝資本をより多く使ってビジネスをする企業。例：アディダスの途上国工場（労働集約）vs ドイツ工場（資本集約）。"}, {"lec": 2, "must": true, "q": "経営学とはどのような学問か？", "a": "((組織))の行動を総合的に説明する学問。この講義では組織の中でも特に((企業))に注目する。"}, {"lec": 2, "must": true, "q": "経済学と経営学の違いは？", "a": "経済学は企業を((生産関数))として表現する。経営学は企業が((効率的に目的を達成))するには何をすればいいかを詳細に分析・研究する（心理学・社会学・工学など多くの学問を融合活用）。"}, {"lec": 2, "must": true, "q": "組織とは何のために存在するか？", "a": "((特定の目標達成))のため。組織の例：大学、政府、NPO、サークル、((企業))など。"}, {"lec": 2, "must": true, "q": "企業をマラソン走者に例えると、「戦略」と「組織」はそれぞれ何にあたるか？", "a": "戦略＝((ゴール))の位置（目標）・どう走るか（計画）・変化への対処（変化対応）。組織＝((ゴールまで走り切るための丈夫な肉体))。"}, {"lec": 2, "must": true, "q": "経営戦略論は何に分類されるか？", "a": "①((競争戦略論))：一つの事業がどう目標を立て実行するか（第4〜6回）。②((全社戦略論))：複数の事業部を持つ企業が全社的な目標を立て実行するか（第7〜8回）。"}, {"lec": 2, "must": true, "q": "経営組織論は何に分類されるか？", "a": "①((ミクロ組織論))：組織の中の個人に焦点（第10〜11回・動機づけ理論）。②((マクロ組織論))：組織全体に焦点（第12回組織デザイン・第13回組織文化）。"}, {"lec": 3, "must": true, "q": "戦略（Strategy）とは何か？", "a": "軍事用語。軍隊を統率して((最終的に戦争に勝利))するための((全体計画))と((個別の活動方針))。"}, {"lec": 3, "must": true, "q": "戦略と戦術の違いは？", "a": "戦略＝戦争に勝つための((全体的、統括的))なもの。戦術（tactics）＝((個々の戦闘))においていかに敵に勝つかの方針。"}, {"lec": 3, "must": true, "q": "戦略の要素を挙げよ。", "a": "(1)到達すべき((目標やゴール)) (2)((外部要因・内部要因の分析)) (3)((長期的・包括的な道筋、シナリオ)) (4)((変化への対応))。"}, {"lec": 3, "must": true, "q": "経営戦略（management strategy）とは何か？", "a": "企業を管理して、((最終的にビジネスで勝利))するための((全体計画))と((個別の活動方針))。"}, {"lec": 3, "must": true, "q": "経営戦略の3つの分類とその関係は？", "a": "①((全社戦略))：複数の事業部を持つ企業の全社的な目標と実行 ②((競争戦略))：一つの事業の目標と実行 ③((機能戦略))：研究開発・生産・販売・財務・人事など機能部門レベルの目標と実行。3つは((相互に深く関係))しており、((独立して個別に機能するものではない))。"}, {"lec": 3, "must": true, "q": "競争優位（competitive advantage）とは？", "a": "企業が自身の行動により市場で((経済価値を創出))し、かつ((同様の行動を取っている競合企業がほとんど存在しない))状態。他社は((戦略を知らない))か、((知っていてもそれを実行することが出来ない))。"}, {"lec": 3, "must": true, "q": "競争均衡（competitive parity）とは？", "a": "企業が((経済価値を創出))してはいるが、複数の競合企業も同様の行動を取っている状態。他社も((戦略を理解))し、((戦略を実行に移すことが出来る))。競争均衡は長く続かない。"}, {"lec": 3, "must": true, "q": "競争劣位（competitive disadvantage）とは？", "a": "企業が自身の行動により((経済価値を創出していない))状態。戦略が((市場に適合していない))場合。企業は((常に競争優位を求める))。"}, {"lec": 3, "must": true, "q": "競争とはどのような概念か？", "a": "((相対的))な概念である（他社との比較で優位・均衡・劣位が決まる）。"}, {"lec": 3, "must": true, "q": "経営戦略は何の連鎖といわれるか？", "a": "((目標-手段の連鎖))。((将来))と((現在))の間で((バランス))を取りながら目標-手段の連鎖をたどっていく。"}, {"lec": 3, "must": true, "q": "創発戦略（emergent strategy）とは？", "a": "((事前には意図していなかった一貫性やパターン))が((事後的))に観察されるような戦略。((計画通りにいかない場合))に、((事前に意図したものとは違う道筋で目標を達成))すること。例：ホンダの米国進出（スーパーカブ）。"}, {"lec": 4, "must": true, "q": "SWOT分析のS・W・O・Tはそれぞれ何か？", "a": "S: Strength ((強み)) / W: Weaknesses ((弱み)) / O: Opportunities ((機会)) / T: Threats ((脅威))。"}, {"lec": 4, "must": true, "q": "SWOTのうち内部要因と外部要因はどれか？", "a": "((強み))・((弱み))＝((内部要因))。((機会))・((脅威))＝((外部要因))。強みを活かし、弱みを補完し、機会を利用し、脅威を避ける。"}, {"lec": 4, "must": true, "q": "業界構造分析の目的は？", "a": "業界の構造を分析して、その業界の((潜在収益性))を把握すること。手法が5つの力（five forces）分析。"}, {"lec": 4, "must": true, "q": "業界構造分析における「脅威」とは何を意味するか？", "a": "自社（企業）の利益を奪おうとするもの。脅威が多い業界では自社の利益は減るため、できるだけ脅威が少ない業界に((ポジショニング))（positioning）する。"}, {"lec": 4, "must": true, "q": "5つの力（five forces）をすべて挙げよ。", "a": "①業界内の競争 ②売り手（供給業者）の交渉力 ③買い手の交渉力 ④新規参入の脅威（移動の脅威） ⑤代替品の脅威。"}, {"lec": 4, "must": true, "q": "5つの力それぞれで問うべきことは？", "a": "①((その業界では競争は激しいか？)) ②((売り手の交渉力は強いか？)) ③((買い手の交渉力は強いか？)) ④((新規参入しやすいか？)) ⑤((今の商品よりも良い代替品はないのか？))"}, {"lec": 4, "must": false, "q": "5つの力分析の注意事項は？", "a": "評価の基準は主観的である。"}, {"lec": 5, "must": true, "q": "同じ業界の中でも企業のパフォーマンスに差が生じるのはなぜか？", "a": "個々の企業には((個体差))があるから。その個体差の源泉が((経営資源))である。"}, {"lec": 5, "must": true, "q": "経営資源の4つの種類は？有形・無形の区別も答えよ。", "a": "物的資源（((モノ))）・財務資源（((カネ))）・人的資源（((ヒト))）・((情報))的資源。モノ・カネ・ヒトは((有形))、情報は((無形))の経営資源。"}, {"lec": 5, "must": true, "q": "VRIフレームワークのV・R・Iはそれぞれ何を問うか？", "a": "((VRIフレームワーク))：V（バリュー）＝その経営資源は価値があるか？ R（レア）＝その経営資源は希少か？ I（イミテーション）＝その経営資源は模倣されにくいか？"}, {"lec": 5, "must": true, "q": "VRIの「①価値（V）」の判断基準は？", "a": "経営資源が本当に((企業の強みになるのか))。□その資源を使って利益を得ることができる □その資源は企業の目標達成に役立つ。"}, {"lec": 5, "must": true, "q": "VRIの「②稀少性（R）」の判断基準は？", "a": "企業の価値ある資源は((稀少なのか))。□その資源はユニークなものである □少ない数の企業しか持っていない。"}, {"lec": 5, "must": true, "q": "VRIの「③模倣困難性（I）」の判断基準は？", "a": "価値があり希少な経営資源を((他社にまねされにくいか))。□歴史的に生まれた □獲得の因果関係が複雑 □特許で守られている。"}, {"lec": 6, "must": true, "q": "市場シェア（占有率）とは？", "a": "((市場シェア(占有率)))＝特定の市場の中で、ある企業の商品やサービスがどれくらいの割合を占めているかを示す比率。例：トヨタ120万台÷全体300万台＝40%。"}, {"lec": 6, "must": true, "q": "市場シェアの意味（高シェアのメリット）を4つ挙げよ。", "a": "①((業界内での地位)) ②((顕示効果))（目に触れる機会が増え広報効果大） ③((情報収集))（多様な顧客からフィードバックを得やすい） ④((コスト削減))（販売・生産量増でコスト減）。"}, {"lec": 6, "must": false, "q": "規模の経済とは？", "a": "ある製品の生産・販売の規模を拡大することによって、生産にかかわる費用、特に「単位当たり費用」が減少すること。固定費用の拡散効果。"}, {"lec": 6, "must": false, "q": "経験効果とは？（第6回の定義）", "a": "累積生産量が倍増するたびに一定の比率で単位当たりコストが減少する現象。例：経験効果80%なら原価1000円→800円→640円→512円。"}, {"lec": 6, "must": true, "q": "競争ポジションは何によって決まるか？4つのポジションは？", "a": "((競争ポジション))はシェアと企業活動の態度によって決まる。①((リーダー))（最大シェア）②((チャレンジャー))（中位シェア・リーダーに挑む）③((ニッチャー))（独自セグメントの小市場。小シェア≠ニッチャー）④((フォロワー))（リーダーへの攻撃姿勢なし）。"}, {"lec": 6, "must": false, "q": "市場地位を経営資源の量と質で整理すると？", "a": "量大×質高＝リーダー／量小×質高＝ニッチャー／量大×質低＝チャレンジャー／量小×質低＝フォロワー。量的資源＝営業マン数・資金力・生産能力など。質的資源＝ブランドイメージ・技術水準など。"}, {"lec": 6, "must": true, "q": "競争ポジション別戦略の要点は？（なぜ学ぶのか）", "a": "((競争ポジション別に企業がとるべき戦略が異なる))から。地位に合わない戦略は機能しない。"}, {"lec": 6, "must": false, "q": "リーダーの戦略は？", "a": "目標：シェアの維持・拡大、市場全体の拡大、業界最大利潤。戦略：フルライン・フルカバレッジ、開放型チャネル、価格やや高め、徹底した同質化（他社の成功製品をすかさず模倣）。"}, {"lec": 6, "must": false, "q": "チャレンジャーの戦略は？", "a": "目標：シェアを拡大しトップになる。戦略：セミフルカバレッジ、差別化戦略（リーダーが同質化できない差別化、リーダーの持たない経営資源を利用）、機能とブランド強調。"}, {"lec": 6, "must": false, "q": "ニッチャーの戦略は？", "a": "目標：限定されたニッチ・セグメントで高い利益率（高利潤）を維持。戦略：中程度以上の品質・価格で特定セグメントに提供、閉鎖型チャネル。他企業に魅力的に映らないほど小さい市場、独自のセグメンテーション・独自能力で参入を防ぐ。"}, {"lec": 6, "must": false, "q": "フォロワーの戦略は？", "a": "目標：生存し続けること（生存利益）。上位企業に魅力的でないセグメントを狙い競争を挑まれないようにする。戦略：リーダーのマーケティング・ミックスを一ランク落として模倣、徹底したコスト削減、低価格対応。"}, {"lec": 7, "must": true, "q": "第4〜6回と第7回以降で対象とする戦略の違いは？", "a": "第4〜6回は個別事業を対象とする((競争戦略))。第7回以降は複数の事業をもつ企業全体を対象とする((全社戦略))。"}, {"lec": 7, "must": true, "q": "多角化（Diversification）とは？", "a": "((多角化))＝企業が事業活動を行って外部に販売する製品分野の全体の((多様性))が増すこと。企業は一つの((主力事業))から始めて他の事業に拡大していく。"}, {"lec": 7, "must": false, "q": "市場×製品のマトリックス（現在/新規）で4つの戦略は？", "a": "現市場×現製品＝市場浸透／現市場×新製品＝製品開発／新市場×現製品＝市場開発／新市場×新製品＝多角化。"}, {"lec": 7, "must": false, "q": "多角化の動機を4つ挙げよ。", "a": "①既存事業の停滞 ②リスク分散 ③シナジー効果 ④未使用資源の有効活用。"}, {"lec": 7, "must": false, "q": "「選択と集中」とは？", "a": "増えすぎた事業を整理して事業間のシナジーを出すこと。選択＝どの事業を残すか。集中＝どの事業に資源を投入するか。例：GEのジャック・ウェルチの改革。"}, {"lec": 7, "must": true, "q": "多角化の類型を分類する3つの比率は？", "a": "特化率（主力事業の売上比率）・垂直比率・関連比率。"}, {"lec": 7, "must": true, "q": "多角化の5類型と基準は？", "a": "①((専業型))：特化率≧95% ②((垂直型))：特化率＜95%かつ垂直比率≧70% ③((本業中心型))：垂直比率＜70%かつ特化率≧70% ④((関連型))：特化率＜70%・垂直比率＜70%・関連比率≧70% ⑤((非関連型))：すべて70%未満で突出した事業がない。"}, {"lec": 7, "must": false, "q": "垂直統合とは？", "a": "同一製品分野における取引関係にある分業単位への進出。原材料調達・部品製造・最終組立・販売などの領域に事業を拡張すること。例：自動車組立会社が鉄鋼事業を始める。"}, {"lec": 8, "must": false, "q": "製品ライフサイクルとは？4つの段階は？", "a": "製品市場の状況は常に一定ではなく、企業はこれに応じて事業戦略を転換する必要があるという考え方。段階：導入期→成長期→成熟期→衰退期。"}, {"lec": 8, "must": false, "q": "製品ライフサイクル各期の特徴（売上・コスト・利益）は？", "a": "導入期：売上低調・高コスト・利益マイナス／成長期：売上急上昇・平均的コスト・利益上昇／成熟期：売上ピーク・低コスト・高利益／衰退期：売上減少・低コスト・利益減少。"}, {"lec": 8, "must": true, "q": "経験曲線効果（経験効果）とは？", "a": "((累積生産量が大きくなればなるほど（生産経験を積めば積むほど）、次の1個を作るための総コストが小さくなる))という経験則。累積生産量が2倍、4倍…となるにつれコストが15〜30%ずつ下がる（習熟率）。"}, {"lec": 8, "must": true, "q": "経験効果が働くもとで、シェアの大きい企業はどうなるか？", "a": "シェアが大きい＝他社より生産数が多い＝他社よりコストが低い＝((シェアが大きい他社より利益率が高い))、ということになる。"}, {"lec": 8, "must": false, "q": "経験効果が起きる原因を5つ挙げよ。", "a": "①労働者の能率向上 ②作業の専門化と方法の改善 ③新しい生産工程 ④生産設備の能率向上 ⑤製品設計（の改善）。"}, {"lec": 8, "must": true, "q": "PPM（製品ポートフォリオマネジメント）とは？", "a": "多事業（多製品）企業における資金の配分を考えるためのツール。製品ライフサイクル＝どこに資金を投資するか、経験効果＝どこから資金が入ってくるか、を組み合わせたもの。"}, {"lec": 8, "must": true, "q": "PPMの図の縦軸・横軸は？相対市場シェアの計算式は？", "a": "((横軸：相対市場シェアの大小))、((縦軸：市場成長率(%)))。((相対市場シェア＝自社の市場シェア÷最大のライバルの市場シェア))。これで2×2のポートフォリオ・マトリックスを作る。"}, {"lec": 8, "must": true, "q": "「金のなる木（cash cow）」の特徴と打ち手は？", "a": "相対市場シェア高→売上大、市場成長率低→資金需要低。市場は成熟〜衰退期。利益大で企業の資金源。シェア維持の投資にとどめ利益を最大化し、その資金を問題児に投資して花形へ育てる。"}, {"lec": 8, "must": true, "q": "「負け犬（dog）」の特徴と打ち手は？", "a": "相対市場シェア低→売上小、市場成長率低→資金需要小。将来性がなく大きな利益も見込めない。そのまま搾り取るか、売却する。"}, {"lec": 8, "must": true, "q": "「花形（star）」の特徴と打ち手は？", "a": "相対市場シェア高→売上大、市場成長率高→資金需要大。市場は成長期。地位を維持できれば将来の「金のなる木」に育てられる。"}, {"lec": 8, "must": true, "q": "「問題児（question mark）」の特徴と打ち手は？", "a": "相対市場シェア低→売上小、市場成長率高→資金需要大。赤字の恐れがあるが花形になる可能性もある。資金を投入しシェア奪取を狙う。問題児が多すぎる場合は売却・整理を考える。"}, {"lec": 8, "must": false, "q": "PPMの限界は？", "a": "市場の定義（どの範囲の製品市場を一つの分析単位とするか）が難しい、など。"}, {"lec": 9, "must": true, "q": "組織の例にはどんなものがあるか？この講義で注目するのは？", "a": "((政府、NPO、病院、サークル、企業))など。この講義では特に((企業))に注目する。"}, {"lec": 9, "must": true, "q": "「組織」の定義は？", "a": "2人以上の人が集まり、((特定の目標達成))のために意識的に調整された活動、相互作用の体系。言い換えると、特定の目的を達成するために複数の人が協働するシステム。"}, {"lec": 9, "must": false, "q": "「組織である」と言えるための条件は？（〜は組織ではない）", "a": "①一人では組織ではない ②組織を構成するのは「人間」ではなく「人間の活動、力」 ③無意識的な集まりは組織ではない（特定の目的と意識的な調整が必要） ④相互作用がないと組織ではない。"}, {"lec": 9, "must": true, "q": "意思決定とは？", "a": "行動に先立って「どの行動をするか選択」すること＝((意思決定))。組織の行動を説明するには、組織の中の個人の意思決定を知る必要がある。"}, {"lec": 9, "must": false, "q": "意思決定前提を5つ挙げよ。", "a": "①目標 ②代替的選択肢の集合 ③各代替選択肢の期待される結果の集合 ④各結果がもたらす効用の集合 ⑤意思決定ルール。"}, {"lec": 9, "must": true, "q": "トップダウンとは？メリット・デメリットは？", "a": "((トップダウン))＝上（トップ）から下に向かう下方向コミュニケーション。トップが情報を集めて決定し下方に指示・伝達。メリット：意思決定が早く統一された動き。デメリット：現場の意見が反映されにくい。"}, {"lec": 9, "must": true, "q": "ボトムアップとは？メリット・デメリットは？", "a": "((ボトムアップ))＝下（ボトム）から上に向かう上方向コミュニケーション。現場で情報を集約・決定し意向を上に伝える。メリット：メンバーのやる気を高め、現実に近い視点の意思決定。デメリット：統合性喪失の危険、意思決定スピード低下。"}, {"lec": 9, "must": true, "q": "組織におけるコミュニケーションは人体の何に例えられるか？", "a": "((血液の流れ))。組織全体に情報を行き渡らせる重要な役割を持つ。"}, {"lec": 10, "must": true, "q": "動機づけ（motivation）とは？", "a": "((動機づけ))＝人が行動を起こし、それを持続させるプロセス。人は楽をしたがるため、組織で働かせるには動機づけが必要になる。"}, {"lec": 10, "must": true, "q": "外発的動機づけとは？外的報酬とは？", "a": "((外発的動機づけ))＝((外的報酬))を与えることでモチベーションを高めること。外的報酬＝職務に従事する当事者からみて他人から与えられる報酬（例：金銭報酬）。"}, {"lec": 10, "must": true, "q": "内発的動機づけとは？内的報酬とは？", "a": "((内発的動機づけ))＝その活動以外には明白な報酬がないのに、活動に携わること自体で報酬を感じ動機づけされること。((内的報酬))＝ある活動に携わることで満足感を得ること。"}, {"lec": 10, "must": true, "q": "期待理論とは？誰が提唱したか？", "a": "((期待理論))＝ブルームが提唱した外的報酬に基づく動機づけ理論。職務遂行から得られると予想される報酬の期待値が大きくなれば、職務遂行への動機づけも大きくなると主張。意思決定理論の延長線上で動機づけを説明。"}, {"lec": 10, "must": true, "q": "期待理論の「期待」「手段性」「誘位性」とは？", "a": "((期待))＝行為（仕事）と「1次の結果（成果）」をつなぐ主観確率。((手段性))＝「1次の結果」から「2次の結果」が決まる確率。((誘位性))＝「2次の結果」の魅力度（金額ではなく効用で表す）。"}, {"lec": 10, "must": true, "q": "成果主義とは？", "a": "((成果主義))＝職務に対する((報酬))、もしくは((人事))において、業務の成果に関する評価を用いて決定すること。従業員の職務に対する意識と意欲を高めることを目的とする。"}, {"lec": 10, "must": false, "q": "歩合制の2つの形は？", "a": "完全歩合と、固定給＋歩合。成果主義の運営では基本給の上に個人の成果に連動した部分を上乗せする形が多い。"}, {"lec": 11, "must": true, "q": "期待理論の限界は？", "a": "どの行動を選択するかは説明できるが、その行動をどれくらい((頑張るか))は説明できない。また「合理的で経済的な」人間観を前提にしており非現実的な部分も多い。期待理論の人間は((楽な方へながれる))（((仕事の内容))そのものへの動機を説明できない）。"}, {"lec": 11, "must": true, "q": "動機づけ衛生理論とは？誰が、どんな調査から導いたか？", "a": "ハーズバーグが、米ピッツバーグ市の企業9社の技術者と会計担当者約200人への調査から導いた理論。満足要因と不満足要因を発見した。"}, {"lec": 11, "must": true, "q": "満足要因と不満足要因の定義は？", "a": "((満足要因))＝あったらうれしいもの（「〇〇があったからうれしい」）。((不満足要因))＝なければ不快感を感じるもの（「〇〇がないから不愉快だ」）。"}, {"lec": 11, "must": true, "q": "満足要因・不満足要因（衛生要因）の具体的な項目は？", "a": "((満足要因))：達成、承認、仕事そのもの、責任、昇進→より優れた遂行と努力へ動機づける。((不満足要因))（衛生要因）：会社の方針と管理、監督、給与、対人関係、作業条件→満たせば職務不満足を予防する。"}, {"lec": 11, "must": true, "q": "外発的・内発的動機づけは、満足要因・不満足要因とどう関係するか？", "a": "外発的動機づけは不満足要因と関係し、仕事の選択・欠勤・離職などと関係する。内発的動機づけは満足要因と関係し、仕事の内容・生産性などと関係する。"}, {"lec": 11, "must": true, "q": "欲求段階説とは？提唱者は？注意点は？", "a": "人間の欲求を段階的に整理した((欲求段階説))。マズローが提唱。注意点：実証的な研究は行われておらず、あくまで仮説段階の「説」であること。"}, {"lec": 11, "must": true, "q": "欲求段階説の5段階を下から順に挙げよ。", "a": "①生理的欲求 →②安全欲求 →③愛情欲求 →④尊敬欲求 →⑤自己実現欲求。欲求には((優先度))があり、優先度の高い欲求から満たそうとする。"}, {"lec": 11, "must": false, "q": "5つの欲求それぞれの内容は？", "a": "①生理的欲求：衣食住、恒常性維持に必要、最優先。②安全欲求：安全が脅かされないこと、秩序・法を求める。③愛情欲求：家族・友人・恋人との愛情関係、集団への所属。④尊敬欲求：自分自身の能力と達成＋他人からの承認・注目。⑤自己実現欲求：①〜④が満たされたとき出現、「理想の自分」に近づきたい欲求。"}, {"lec": 11, "must": true, "q": "欠乏欲求と成長欲求の区別は？", "a": "((欠乏欲求))＝生理的欲求・安全欲求・愛情欲求（何かが足りないことに対応する欲求）。((成長欲求))＝尊敬欲求・自己実現欲求（成長を最終目的とする欲求）。"}, {"lec": 11, "must": true, "q": "内的報酬となる満足感をもたらすものは何か？それはどんな行動につながるか？", "a": "((有能さ))と((自己決定の感覚))。これを経験したいという内発的欲求により、人は自分にとって最適（適度）なチャレンジを追求しようとする→楽な方に流れない。"}, {"lec": 11, "must": false, "q": "デシの実験（1975年）の内容と示したことは？", "a": "ソーマキューブ（パズル）を使った実験。金銭的報酬を与えられた学生は、報酬がなくなると自発的にパズルに取り組まなくなった。金銭的な外的報酬が内発的動機づけを低下させることを示した。"}, {"lec": 12, "must": true, "q": "官僚制システムとは？【灰色空欄】", "a": "((官僚制システム))＝最も基本的な組織のひとつであり、組織に正当性を付与し、合理的に管理運営が出来るように仕組まれたシステム。最高責任を担う幹部を頂点にピラミッド型の形態を成し、上位下達のコミュニケーション・チャネルを発達させる。"}, {"lec": 12, "must": true, "q": "官僚制システムの5つの特徴は？", "a": "①規則と手続き ②専門化と分業 ③ヒエラルキー ④専門的な知識や技術を持った個人の採用 ⑤文書による伝達と記録。"}, {"lec": 12, "must": false, "q": "官僚制システムのメリットは？", "a": "大きな組織を合理的に運営できる。できるだけ少ないコストでできるだけ多くの便益を得る（組織の目的を達成する）ことができる。つまり合理的かつ効率的。"}, {"lec": 12, "must": false, "q": "官僚制のデメリットは？", "a": "①人間性の疎外問題 ②規則・命令の重視しすぎによる形式主義 ③繁文縟礼（書類・手続きが複雑になりすぎて不便になる） ④過度な専門化が部門間コミュニケーションを阻む。"}, {"lec": 12, "must": true, "q": "機能別組織とは？メリット・デメリットは？【灰色空欄】", "a": "((機能別組織))＝組織を運営するために必要な機能ごとに部門が分かれている組織（例：生産・研究開発・販売・購買部門）。メリット：類似の仕事の人が集まり専門知識を蓄積できる。デメリット：部門間のコミュニケーションが難しくなる。"}, {"lec": 12, "must": true, "q": "事業部制組織とは？メリット・デメリットは？【灰色空欄】", "a": "((事業部制組織))＝扱っている製品や活動している地域を軸として事業を定め、事業ごとに部門を分けている組織（例：A製品事業部、A地域事業部）。メリット：事業部ごとに業務を完結でき独立性が強い。デメリット：事業部間の連携が難しくなる。"}, {"lec": 12, "must": true, "q": "マトリックス組織とは？【灰色空欄】", "a": "((マトリックス組織))＝製品や地域といった事業ごとの軸と機能の軸の両方を取り入れた組織。①複数の目標の同時達成 ②高い情報処理能力が必要 ③資源の共有、という場合に採用。複数の命令系統が存在する（2ボスモデル）。"}, {"lec": 12, "must": true, "q": "組織のサイズとは？大小それぞれの特徴は？【灰色空欄】", "a": "組織の((サイズ))＝従業員の数、資本の大きさ、顧客の数、施設の規模など。小さい組織＝環境変化に敏感で迅速に対応でき、コミュニケーションの伝達効率が良い。大きい組織＝組織効率が高く、スケールメリットを追求できる。"}, {"lec": 12, "must": true, "q": "階層数とは？多い場合・少ない場合の特徴は？【灰色空欄】", "a": "((階層数))＝組織が上から下までどの程度の階層数になっているか。多い→垂直的な組織：コミュニケーションに時間がかかるがトップの権威が大きい。少ない→水平的（フラット）な組織：コミュニケーションは迅速だがトップの権威が乏しい。"}, {"lec": 12, "must": true, "q": "分業化とは？細かく分けるとどうなる？【灰色空欄】", "a": "((分業化))＝組織のタスクをどこまで細分化するのか。細かく分ければ分けるほど専門性が高まり効率的になるが、柔軟性は下がる。仕事を重複させて同時並行的に行う分業化と、細かく分けて重複させない分業化がある。"}, {"lec": 12, "must": true, "q": "統制のスパンとは？【灰色空欄】", "a": "((統制のスパン))＝統制・管理の範囲をどこまでに設定するのか。上司が何人の部下まで・どの範囲まで統制・管理するのが適切かという問題。"}, {"lec": 12, "must": false, "q": "組織デザインで考慮すべき3つの要素は？", "a": "①環境要因：環境変化の激しさに応じて組織デザインを変える。②技術要因：技術によって組織デザインは大きく変わる。③戦略要因：組織の目標と戦略を達成するための組織デザインを考える。"}];

const LECTURES = [
  { n: 2, t: "経済学と経営学" }, { n: 3, t: "経営戦略とは" }, { n: 4, t: "外部環境分析" },
  { n: 5, t: "内部資源分析" }, { n: 6, t: "競争ポジション" }, { n: 7, t: "多角化" },
  { n: 8, t: "PPM" }, { n: 9, t: "組織とは" }, { n: 10, t: "外発的動機づけ" },
  { n: 11, t: "内発的動機づけ" }, { n: 12, t: "組織デザイン" },
];

// ---- state ----
let lecFilter = "all";
let mustOnly = false;
let order = QUESTIONS.map((_, i) => i);
let pos = 0;
let revealed = false;
let mode = "card";
let known = {};
try { known = JSON.parse(localStorage.getItem("keiei_known") || "{}"); } catch (e) { known = {}; }

function saveKnown() {
  try { localStorage.setItem("keiei_known", JSON.stringify(known)); } catch (e) {}
}

function esc(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
// ((...)) → 赤字span
function redify(s) {
  return esc(s).replace(/\(\(/g, '<span class="red">').replace(/\)\)/g, "</span>");
}

function filteredIdx() {
  return order.filter((idx) => {
    const q = QUESTIONS[idx];
    if (lecFilter !== "all" && q.lec !== lecFilter) return false;
    if (mustOnly && !q.must) return false;
    return true;
  });
}

function shuffleArr(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ---- render ----
function renderChips() {
  const box = document.getElementById("lecChips");
  let html = '<button class="chip' + (lecFilter === "all" ? " on" : "") + '" data-lec="all">全部</button>';
  for (const l of LECTURES) {
    html += '<button class="chip' + (lecFilter === l.n ? " on" : "") + '" data-lec="' + l.n + '">第' + l.n + "回</button>";
  }
  box.innerHTML = html;
  box.querySelectorAll(".chip").forEach((b) => {
    b.onclick = () => {
      const v = b.dataset.lec;
      lecFilter = v === "all" ? "all" : Number(v);
      pos = 0; revealed = false;
      render();
    };
  });
  const mb = document.getElementById("mustBtn");
  mb.className = "chip" + (mustOnly ? " aka-on" : "");
  const modeBtn = document.getElementById("modeBtn");
  modeBtn.textContent = mode === "card" ? "一覧モード" : "カードモード";
  modeBtn.className = "chip" + (mode === "list" ? " on" : "");
}

function renderProgress(f) {
  const knownCount = f.filter((i) => known[i] === true).length;
  document.getElementById("posLabel").textContent = f.length === 0 ? "0 / 0" : (Math.min(pos, f.length - 1) + 1) + " / " + f.length + "問";
  document.getElementById("knownLabel").textContent = knownCount;
  document.getElementById("totalLabel").textContent = f.length;
  document.getElementById("barFill").style.width = f.length ? (knownCount / f.length) * 100 + "%" : "0";
}

function renderCard(f) {
  const main = document.getElementById("main");
  if (f.length === 0) { main.innerHTML = '<p class="empty">この条件の問題はありません。</p>'; return; }
  if (pos >= f.length) pos = 0;
  const idx = f[pos];
  const q = QUESTIONS[idx];
  const lecT = (LECTURES.find((l) => l.n === q.lec) || {}).t || "";
  main.innerHTML =
    '<div class="card">' +
      '<div class="tags">' +
        '<span class="tag-lec">第' + q.lec + "回 " + lecT + "</span>" +
        (q.must ? '<span class="tag-must">赤字</span>' : "") +
        (known[idx] === true ? '<span class="tag-known">✓ 覚えた</span>' : "") +
      "</div>" +
      '<p class="qtext">Q. ' + redify(q.q) + "</p>" +
      '<div class="ans-area' + (revealed ? " revealed" : "") + '" id="ansArea">' +
        '<div class="ans-text"><b class="red">A.</b> ' + redify(q.a) + "</div>" +
        '<div class="sheet">赤シートをめくる ▶</div>' +
      "</div>" +
    "</div>" +
    '<div class="controls">' +
      '<button class="btn" id="prevBtn">← 前へ</button>' +
      '<button class="btn btn-mada" id="madaBtn">まだ</button>' +
      '<button class="btn btn-oboe" id="oboeBtn">覚えた</button>' +
      '<button class="btn" id="nextBtn">次へ →</button>' +
    "</div>";

  document.getElementById("ansArea").onclick = () => { revealed = !revealed; render(); };
  document.getElementById("prevBtn").onclick = () => go(-1);
  document.getElementById("nextBtn").onclick = () => go(1);
  document.getElementById("madaBtn").onclick = () => { known[idx] = false; saveKnown(); go(1); };
  document.getElementById("oboeBtn").onclick = () => { known[idx] = true; saveKnown(); go(1); };
}

function renderList(f) {
  const main = document.getElementById("main");
  if (f.length === 0) { main.innerHTML = '<p class="empty">この条件の問題はありません。</p>'; return; }
  let html = '<div style="margin-top:10px">';
  for (const idx of f) {
    const q = QUESTIONS[idx];
    html +=
      "<details>" +
        "<summary>" +
          '<span class="l-lec">第' + q.lec + "回</span>" +
          (q.must ? '<span class="l-must">赤字</span>' : "") +
          redify(q.q) +
        "</summary>" +
        '<p class="l-ans"><b class="red">A.</b> ' + redify(q.a) + "</p>" +
      "</details>";
  }
  html += "</div>";
  main.innerHTML = html;
}

function go(d) {
  const f = filteredIdx();
  if (f.length === 0) return;
  revealed = false;
  pos = (pos + d + f.length) % f.length;
  render();
}

function render() {
  const f = filteredIdx();
  renderChips();
  renderProgress(f);
  if (mode === "card") renderCard(f);
  else renderList(f);
}

document.getElementById("mustBtn").onclick = () => { mustOnly = !mustOnly; pos = 0; revealed = false; render(); };
document.getElementById("shuffleBtn").onclick = () => { order = shuffleArr(QUESTIONS.map((_, i) => i)); pos = 0; revealed = false; render(); };
document.getElementById("resetBtn").onclick = () => { order = QUESTIONS.map((_, i) => i); pos = 0; revealed = false; render(); };
document.getElementById("modeBtn").onclick = () => { mode = mode === "card" ? "list" : "card"; render(); };

document.addEventListener("keydown", (e) => {
  if (mode !== "card") return;
  if (e.key === "ArrowLeft") go(-1);
  else if (e.key === "ArrowRight") go(1);
  else if (e.key === " " || e.key === "Enter") { e.preventDefault(); revealed = !revealed; render(); }
});

render();
</script>
</body>
</html>
